<html lang="fr">
<head>

<title>Serioplast-TNSX - Digital Business Cards</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"><\/script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"><\/script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"><\/script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;background:#f4f7f2;color:#1A1A2E;min-height:100vh}
#loading-screen{position:fixed;inset:0;background:linear-gradient(135deg,#3d6e1e,#61993B);display:flex;align-items:center;justify-content:center;z-index:9999}
.loader{width:48px;height:48px;border:4px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#card-view{display:none;min-height:100vh;background:linear-gradient(160deg,#3d6e1e 0%,#61993B 40%,#7ab356 100%);position:relative;overflow:hidden}
.card-container{position:relative;z-index:1;max-width:440px;margin:0 auto;padding:40px 20px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.business-card{background:#fff;border-radius:24px;overflow:hidden;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.card-header{background:linear-gradient(135deg,#3d6e1e,#61993B);padding:32px 28px 48px;text-align:center;position:relative}
.card-header::after{content:'';position:absolute;bottom:-20px;left:0;right:0;height:40px;background:#fff;border-radius:50% 50% 0 0}
.card-logo{height:36px;margin-bottom:16px;position:relative;z-index:1}
.card-avatar{width:90px;height:90px;border-radius:50%;border:4px solid rgba(255,255,255,0.3);background:linear-gradient(135deg,#61993B,#7ab356);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:32px;font-weight:700;color:#fff;position:relative;z-index:1}
.card-name{font-size:26px;font-weight:600;color:#fff;margin-bottom:4px;position:relative;z-index:1}
.card-title-text{font-size:14px;color:rgba(255,255,255,0.75);position:relative;z-index:1}
.card-body{padding:12px 28px 28px}
.card-info-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid #E5E7EB;text-decoration:none;color:#1A1A2E;transition:0.2s}
.card-info-item:last-child{border-bottom:none}
.card-info-item:hover{color:#61993B}
.card-info-icon{width:40px;height:40px;border-radius:12px;background:#eef5e8;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-info-icon svg{width:18px;height:18px;color:#61993B}
.card-info-label{font-size:11px;font-weight:500;color:#6B7280;text-transform:uppercase;letter-spacing:0.5px}
.card-info-value{font-size:15px;font-weight:500;margin-top:2px}
.card-actions{display:flex;gap:10px;padding:0 28px 28px}
.card-btn{flex:1;padding:14px;border:none;border-radius:14px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:0.25s}
.card-btn-primary{background:#61993B;color:#fff}
.card-btn-primary:hover{background:#7ab356;transform:translateY(-2px)}
.card-btn-secondary{background:#eef5e8;color:#61993B}
.card-btn-secondary:hover{background:#dcebd2}
.card-footer{text-align:center;padding:20px;color:rgba(255,255,255,0.5);font-size:12px}

#login-view{display:none;min-height:100vh;background:linear-gradient(160deg,#3d6e1e,#61993B);align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:24px;padding:48px 36px;width:100%;max-width:420px;box-shadow:0 10px 40px rgba(61,110,30,0.25)}
.login-logo{display:block;height:40px;margin:0 auto 20px}
.login-title{font-size:28px;font-weight:600;text-align:center;margin-bottom:8px;color:#3d6e1e}
.login-subtitle{text-align:center;color:#6B7280;font-size:14px;margin-bottom:32px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:600;color:#1A1A2E;margin-bottom:6px}
.form-input{width:100%;padding:12px 16px;border:2px solid #E5E7EB;border-radius:10px;font-family:inherit;font-size:15px;transition:0.2s;outline:none}
.form-input:focus{border-color:#61993B}
.btn-login{width:100%;padding:14px;background:#61993B;color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:0.2s;margin-bottom:12px}
.btn-login:hover{background:#7ab356}
.btn-login:disabled{opacity:0.6;cursor:not-allowed}
.btn-register{width:100%;padding:14px;background:#eef5e8;color:#61993B;border:2px solid #61993B;border-radius:10px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:0.2s}
.btn-register:hover{background:#dcebd2}
.login-error{background:#FEF2F2;color:#EF4444;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.login-success{background:#eef5e8;color:#3d6e1e;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.login-tabs{display:flex;margin-bottom:24px;border-radius:10px;overflow:hidden;border:2px solid #61993B}
.login-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;transition:0.2s;background:#fff;color:#61993B}
.login-tab.active{background:#61993B;color:#fff}
.pending-badge{display:inline-block;background:#FFFBEB;color:#B45309;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-top:8px}

#admin-view{display:none;min-height:100vh}
.admin-topbar{background:#fff;border-bottom:1px solid #E5E7EB;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(61,110,30,0.08)}
.admin-topbar-left{display:flex;align-items:center;gap:12px}
.admin-topbar-logo{height:28px}
.admin-topbar-title{font-size:18px;font-weight:600;color:#3d6e1e}
.admin-topbar-badge{font-size:11px;font-weight:600;background:#61993B;color:#fff;padding:3px 10px;border-radius:12px;margin-left:10px}
.btn-topbar{padding:8px 16px;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:0.2s}
.btn-topbar-primary{background:#61993B;color:#fff}
.btn-topbar-primary:hover{background:#7ab356}
.btn-topbar-ghost{background:transparent;color:#6B7280}
.btn-topbar-ghost:hover{background:#eef5e8;color:#3d6e1e}
.btn-topbar-warning{background:#FFFBEB;color:#B45309;position:relative}
.btn-topbar-warning:hover{background:#FEF3C7}
.notif-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:#EF4444;border-radius:50%}
.admin-content{max-width:1100px;margin:0 auto;padding:32px 24px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 1px 3px rgba(61,110,30,0.08)}
.stat-value{font-size:36px;font-weight:700;color:#61993B}
.stat-label{font-size:13px;color:#6B7280;margin-top:4px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.employee-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(61,110,30,0.08);transition:0.3s}
.employee-card:hover{box-shadow:0 4px 20px rgba(61,110,30,0.15);transform:translateY(-2px)}
.emp-card-header{background:linear-gradient(135deg,#3d6e1e,#61993B);padding:20px;display:flex;align-items:center;gap:14px}
.emp-avatar{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
.emp-name{font-size:17px;font-weight:600;color:#fff}
.emp-title-text{font-size:13px;color:rgba(255,255,255,0.7)}
.emp-card-body{padding:18px 20px}
.emp-detail{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px;color:#6B7280}
.emp-detail svg{width:16px;height:16px;flex-shrink:0}
.emp-card-actions{padding:14px 20px;border-top:1px solid #E5E7EB;display:flex;gap:8px}
.emp-btn{flex:1;padding:8px 12px;border:none;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:0.2s;display:flex;align-items:center;justify-content:center;gap:5px}
.emp-btn-qr{background:#eef5e8;color:#61993B}
.emp-btn-qr:hover{background:#dcebd2}
.emp-btn-edit{background:#FFFBEB;color:#B45309}
.emp-btn-edit:hover{background:#FEF3C7}
.emp-btn-delete{background:#FEF2F2;color:#EF4444}
.emp-btn-delete:hover{background:#FEE2E2}
.emp-btn-approve{background:#eef5e8;color:#3d6e1e}
.emp-btn-approve:hover{background:#dcebd2}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(61,110,30,0.2)}
.modal-header{padding:24px 24px 0;display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:22px;font-weight:600;color:#3d6e1e}
.modal-close{width:36px;height:36px;border:none;border-radius:50%;background:#eef5e8;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#6B7280;transition:0.2s}
.modal-close:hover{background:#dcebd2}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid #E5E7EB;display:flex;justify-content:flex-end;gap:10px}
.modal-btn{padding:10px 24px;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:0.2s}
.modal-btn-cancel{background:#eef5e8;color:#6B7280}
.modal-btn-cancel:hover{background:#dcebd2}
.modal-btn-save{background:#61993B;color:#fff}
.modal-btn-save:hover{background:#7ab356}
.qr-modal-content{text-align:center;padding:20px}
.qr-display{background:#fff;padding:24px;border-radius:16px;display:inline-block;margin:16px 0;border:2px solid #E5E7EB}
.qr-url{font-size:12px;color:#6B7280;word-break:break-all;margin-top:12px;padding:10px;background:#eef5e8;border-radius:8px}
.qr-actions{margin-top:16px;display:flex;gap:10px;justify-content:center}

.toast{position:fixed;bottom:24px;right:24px;background:#3d6e1e;color:#fff;padding:14px 20px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:0 10px 40px rgba(0,0,0,0.18);transform:translateY(100px);opacity:0;transition:0.4s;z-index:2000}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:#61993B}
.toast.error{background:#EF4444}

.empty-state{text-align:center;padding:60px 20px;color:#6B7280}
.empty-state-icon{font-size:60px;margin-bottom:16px;opacity:0.3}
.empty-state-title{font-size:22px;font-weight:600;color:#1A1A2E;margin-bottom:8px}

.section-title{font-size:18px;font-weight:600;color:#3d6e1e;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #eef5e8}

@media(max-width:480px){
.card-container{padding:20px 12px}
.card-header{padding:24px 20px 40px}
.card-body{padding:8px 20px 20px}
.card-actions{padding:0 20px 20px;flex-direction:column}
.admin-content{padding:20px 12px}
.cards-grid{grid-template-columns:1fr}
.stats-grid{grid-template-columns:repeat(2,1fr)}
.login-box{padding:32px 24px}
.admin-topbar{flex-wrap:wrap;gap:8px}
}
</style>
</head>

var firebaseConfig={apiKey:"AIzaSyDH9RmhKN1geCOGZFPdu-dFpAJUz2SopHI",authDomain:"businesscards-serioplast.firebaseapp.com",projectId:"businesscards-serioplast",storageBucket:"businesscards-serioplast.firebasestorage.app",messagingSenderId:"624214613868",appId:"1:624214613868:web:dbaa802c7b50ef5a631d49"};

var auth=firebase.auth();var db=firebase.firestore();
var CARDS='businessCards';var USERS='users';

function getRoute(){var hash=window.location.hash.replace('#','');if(hash.indexOf('card/')===0)return{view:'card',id:hash.split('/')[1]};if(hash==='admin')return{view:'admin'};if(hash==='user')return{view:'user'};if(hash==='login')return{view:'login'};var params=new URLSearchParams(window.location.search);if(params.get('id'))return{view:'card',id:params.get('id')};return{view:'login'};}

function hideLoading(){var el=document.getElementById('loading-screen');if(el)el.style.display='none';}
function hideAll(){document.getElementById('card-view').style.display='none';document.getElementById('login-view').style.display='none';document.getElementById('admin-view').style.display='none';document.getElementById('user-view').style.display='none';}
function showView(id){var el=document.getElementById(id);el.style.display=(id==='login-view')?'flex':'block';}

function route(){
  hideLoading();var r=getRoute();hideAll();
  if(r.view==='card'){showPublicCard(r.id);return;}
  var user=auth.currentUser;
  if(!user){showView('login-view');return;}
  // Check user role
  db.collection(USERS).doc(user.uid).get().then(function(doc){
    if(!doc.exists){showView('login-view');return;}
    currentUserData=doc.data();
    if(currentUserData.role==='admin'){
      if(r.view==='admin'||r.view==='login'){showView('admin-view');loadCards();loadPending();}
      else{showView('admin-view');loadCards();loadPending();}
    }else if(currentUserData.status==='approved'){
      showView('user-view');loadUserCard();
    }else{
      showView('user-view');showPendingStatus();
    }
  }).catch(function(){showView('login-view');});
}

auth.onAuthStateChanged(function(user){route();});
window.addEventListener('hashchange',function(){route();});

function switchTab(tab){
  document.getElementById('login-error').style.display='none';
  document.getElementById('login-success').style.display='none';
  if(tab==='login'){
    document.getElementById('tab-login').className='login-tab active';
    document.getElementById('tab-register').className='login-tab';
    document.getElementById('form-login').style.display='block';
    document.getElementById('form-register').style.display='none';
    document.getElementById('auth-title').textContent='Connexion';
  }else{
    document.getElementById('tab-login').className='login-tab';
    document.getElementById('tab-register').className='login-tab active';
    document.getElementById('form-login').style.display='none';
    document.getElementById('form-register').style.display='block';
    document.getElementById('auth-title').textContent='Inscription';
  }
}

function doRegister(){
  var firstName=document.getElementById('reg-firstName').value.trim();
  var lastName=document.getElementById('reg-lastName').value.trim();
  var email=document.getElementById('reg-email').value.trim();
  var password=document.getElementById('reg-password').value;
  var errDiv=document.getElementById('login-error');var sucDiv=document.getElementById('login-success');
  errDiv.style.display='none';sucDiv.style.display='none';
  if(!firstName||!lastName||!email||!password){errDiv.textContent='Veuillez remplir tous les champs.';errDiv.style.display='block';return;}
  if(password.length<6){errDiv.textContent='Le mot de passe doit faire au moins 6 caracteres.';errDiv.style.display='block';return;}
  var btn=document.getElementById('btn-register');btn.disabled=true;btn.textContent='Inscription...';
  auth.createUserWithEmailAndPassword(email,password).then(function(cred){
    return db.collection(USERS).doc(cred.user.uid).set({firstName:firstName,lastName:lastName,email:email,role:'user',status:'pending',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  }).then(function(){
    sucDiv.textContent='Inscription reussie! Votre compte est en attente de validation par l administrateur.';sucDiv.style.display='block';
    btn.disabled=false;btn.textContent='S\'inscrire';
    route();
  }).catch(function(e){
    var msg='Erreur lors de l inscription.';
    if(e.code==='auth/email-already-in-use')msg='Cet email est deja utilise.';
    if(e.code==='auth/weak-password')msg='Le mot de passe est trop faible.';
    errDiv.textContent=msg;errDiv.style.display='block';btn.disabled=false;btn.textContent='S\'inscrire';
  });
}

function doLogin(){
  var email=document.getElementById('login-email').value.trim();var password=document.getElementById('login-password').value;
  var btn=document.getElementById('btn-login');var errDiv=document.getElementById('login-error');errDiv.style.display='none';
  if(!email||!password){errDiv.textContent='Veuillez remplir tous les champs.';errDiv.style.display='block';return;}
  btn.disabled=true;btn.textContent='Connexion...';
  auth.signInWithEmailAndPassword(email,password).then(function(){route();}).catch(function(e){
    var msg='Erreur de connexion.';if(e.code==='auth/user-not-found'||e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')msg='Email ou mot de passe incorrect.';
    errDiv.textContent=msg;errDiv.style.display='block';btn.disabled=false;btn.textContent='Se connecter';
  });
}

function doLogout(){auth.signOut().then(function(){currentUserData=null;window.location.hash='login';});}

function showPendingStatus(){
  var content=document.getElementById('user-content');
  var badge=document.getElementById('user-status-badge');
  if(currentUserData.status==='pending'){
    badge.innerHTML='<span class="pending-badge">En attente de validation</span>';
    content.innerHTML='<div class="empty-state"><div class="empty-state-icon">&#9203;</div><div class="empty-state-title">Compte en attente</div><p>Votre inscription est en attente de validation par l\'administrateur. Vous pourrez creer votre carte de visite une fois approuve.</p></div>';
  }else if(currentUserData.status==='rejected'){
    badge.innerHTML='<span class="pending-badge" style="background:#FEF2F2;color:#EF4444">Refuse</span>';
    content.innerHTML='<div class="empty-state"><div class="empty-state-icon">&#10060;</div><div class="empty-state-title">Inscription refusee</div><p>Votre demande d\'inscription a ete refusee. Contactez l\'administrateur.</p></div>';
  }
}

function loadUserCard(){
  var user=auth.currentUser;
  var badge=document.getElementById('user-status-badge');
  badge.innerHTML='<span class="pending-badge" style="background:#eef5e8;color:#3d6e1e">Approuve</span>';
  var content=document.getElementById('user-content');
  // Check if user already has a card
  db.collection(CARDS).where('ownerUid','==',user.uid).get().then(function(snap){
    if(snap.empty){
      content.innerHTML='<div class="empty-state"><div class="empty-state-icon">&#128199;</div><div class="empty-state-title">Creez votre carte</div><p>Vous etes approuve! Cliquez ci-dessous pour creer votre carte de visite.</p><br><button class="btn-login" style="max-width:300px;margin:0 auto;display:block" onclick="openUserCardModal()">Creer ma carte</button></div>';
    }else{
      var doc=snap.docs[0];var c=doc.data();c.id=doc.id;
      var initials=((c.firstName||'').charAt(0)+(c.lastName||'').charAt(0)).toUpperCase();
      var html='<div style="max-width:500px;margin:0 auto">';
      html+='<div class="employee-card"><div class="emp-card-header"><div class="emp-avatar">'+initials+'</div><div><div class="emp-name">'+(c.firstName||'')+' '+(c.lastName||'')+'</div><div class="emp-title-text">'+(c.title||'')+'</div></div></div>';
      html+='<div class="emp-card-body">';
      if(c.phone)html+='<div class="emp-detail">'+c.phone+'</div>';
      if(c.email)html+='<div class="emp-detail">'+c.email+'</div>';
      if(c.department)html+='<div class="emp-detail">'+c.department+'</div>';
      html+='</div><div class="emp-card-actions">';
      html+='<button class="emp-btn emp-btn-qr" onclick="showQR(\''+c.id+'\',\''+(c.firstName||'')+' '+(c.lastName||'').replace(/'/g,"\\'")+'\')" >QR Code</button>';
      html+='<button class="emp-btn emp-btn-edit" onclick="openEditModal(\''+c.id+'\')">Modifier</button>';
      html+='</div></div></div>';
      content.innerHTML=html;
      currentCards=[c];
    }
  });
}

function openUserCardModal(){
  document.getElementById('modal-form-title').textContent='Creer ma carte';
  document.getElementById('edit-id').value='';
  document.getElementById('f-firstName').value=currentUserData.firstName||'';
  document.getElementById('f-lastName').value=currentUserData.lastName||'';
  document.getElementById('f-title').value='';document.getElementById('f-department').value='';
  document.getElementById('f-phone').value='';document.getElementById('f-email').value=currentUserData.email||'';
  document.getElementById('f-linkedin').value='';document.getElementById('f-company').value='Serioplast-TNSX';
  openModal('modal-form');
}

function loadPending(){
  db.collection(USERS).where('status','==','pending').get().then(function(snap){
    var btn=document.getElementById('btn-pending');
    if(snap.empty){btn.style.display='none';document.getElementById('pending-section').style.display='none';return;}
    btn.style.display='inline-block';
    var html='';
    snap.forEach(function(doc){
      var u=doc.data();
      html+='<div class="employee-card"><div class="emp-card-header"><div class="emp-avatar">'+((u.firstName||'').charAt(0)+(u.lastName||'').charAt(0)).toUpperCase()+'</div><div><div class="emp-name">'+(u.firstName||'')+' '+(u.lastName||'')+'</div><div class="emp-title-text">'+(u.email||'')+'</div></div></div>';
      html+='<div class="emp-card-actions"><button class="emp-btn emp-btn-approve" onclick="approveUser(\''+doc.id+'\')">Approuver</button><button class="emp-btn emp-btn-delete" onclick="rejectUser(\''+doc.id+'\')">Refuser</button></div></div>';
    });
    document.getElementById('pending-grid').innerHTML=html;
  });
}

function showPending(){
  var sec=document.getElementById('pending-section');
  sec.style.display=sec.style.display==='none'?'block':'none';
}

function approveUser(uid){
  db.collection(USERS).doc(uid).update({status:'approved'}).then(function(){showToast('Utilisateur approuve!','success');loadPending();}).catch(function(){showToast('Erreur','error');});
}
function rejectUser(uid){
  db.collection(USERS).doc(uid).update({status:'rejected'}).then(function(){showToast('Utilisateur refuse.','success');loadPending();}).catch(function(){showToast('Erreur','error');});
}

function showPublicCard(cardId){
  db.collection(CARDS).doc(cardId).get().then(function(doc){
    if(!doc.exists){document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#666"><div style="text-align:center"><h2>Carte introuvable</h2></div></div>';return;}
    var data=doc.data();currentCardData={id:doc.id};for(var k in data)currentCardData[k]=data[k];
    db.collection(CARDS).doc(cardId).update({scanCount:firebase.firestore.FieldValue.increment(1)}).catch(function(){});
    var initials=((data.firstName||'').charAt(0)+(data.lastName||'').charAt(0)).toUpperCase();
    document.getElementById('cv-avatar').textContent=initials;
    document.getElementById('cv-name').textContent=(data.firstName||'')+' '+(data.lastName||'');
    document.getElementById('cv-title').textContent=data.title||'';
    if(data.phone){document.getElementById('cv-phone').textContent=data.phone;document.getElementById('cv-phone-row').href='tel:'+data.phone;document.getElementById('cv-phone-row').style.display='flex';}else{document.getElementById('cv-phone-row').style.display='none';}
    if(data.email){document.getElementById('cv-email').textContent=data.email;document.getElementById('cv-email-row').href='mailto:'+data.email;document.getElementById('cv-email-row').style.display='flex';}else{document.getElementById('cv-email-row').style.display='none';}
    if(data.department){document.getElementById('cv-dept').textContent=data.department;document.getElementById('cv-dept-row').style.display='flex';}else{document.getElementById('cv-dept-row').style.display='none';}
    if(data.linkedin){document.getElementById('cv-linkedin-row').href=data.linkedin;document.getElementById('cv-linkedin-row').style.display='flex';}
    showView('card-view');
  }).catch(function(){document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#666"><div style="text-align:center"><h2>Erreur</h2></div></div>';});
}

function downloadVCard(){if(!currentCardData)return;var d=currentCardData;var v='BEGIN:VCARD\nVERSION:3.0\n';v+='N:'+(d.lastName||'')+';'+(d.firstName||'')+';;;\n';v+='FN:'+(d.firstName||'')+' '+(d.lastName||'')+'\n';if(d.title)v+='TITLE:'+d.title+'\n';if(d.company)v+='ORG:'+d.company+'\n';if(d.phone)v+='TEL;TYPE=WORK,VOICE:'+d.phone+'\n';if(d.email)v+='EMAIL;TYPE=WORK:'+d.email+'\n';if(d.linkedin)v+='URL:'+d.linkedin+'\n';v+='END:VCARD';var blob=new Blob([v],{type:'text/vcard;charset=utf-8'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=(d.firstName+'_'+d.lastName).replace(/\s/g,'_')+'.vcf';a.click();URL.revokeObjectURL(url);showToast('Contact telecharge!','success');}
function shareCard(){var url=window.location.href;if(navigator.share){navigator.share({title:'Carte de visite',url:url});}else{navigator.clipboard.writeText(url).then(function(){showToast('Lien copie!','success');});}}

function loadCards(){
  db.collection(CARDS).orderBy('createdAt','desc').get().then(function(snap){
    currentCards=[];snap.forEach(function(d){var item={id:d.id};var data=d.data();for(var k in data)item[k]=data[k];currentCards.push(item);});
    renderStats();renderCards();
  }).catch(function(err){console.error(err);showToast('Erreur de chargement','error');});
}

function renderStats(){
  var total=currentCards.length;var totalScans=0;var deptSet={};
  for(var i=0;i<currentCards.length;i++){totalScans+=(currentCards[i].scanCount||0);if(currentCards[i].department)deptSet[currentCards[i].department]=true;}
  document.getElementById('stats-grid').innerHTML='<div class="stat-card"><div class="stat-value">'+total+'</div><div class="stat-label">Cartes creees</div></div><div class="stat-card"><div class="stat-value">'+totalScans+'</div><div class="stat-label">Scans totaux</div></div><div class="stat-card"><div class="stat-value">'+Object.keys(deptSet).length+'</div><div class="stat-label">Departements</div></div>';
}

function renderCards(){
  var grid=document.getElementById('cards-grid');var empty=document.getElementById('empty-state');
  if(currentCards.length===0){grid.innerHTML='';empty.style.display='block';return;}empty.style.display='none';var html='';
  for(var i=0;i<currentCards.length;i++){var c=currentCards[i];var initials=((c.firstName||'').charAt(0)+(c.lastName||'').charAt(0)).toUpperCase();var name=(c.firstName||'')+' '+(c.lastName||'');
  html+='<div class="employee-card"><div class="emp-card-header"><div class="emp-avatar">'+initials+'</div><div><div class="emp-name">'+name+'</div><div class="emp-title-text">'+(c.title||'')+'</div></div></div><div class="emp-card-body">';
  if(c.phone)html+='<div class="emp-detail">'+c.phone+'</div>';if(c.email)html+='<div class="emp-detail">'+c.email+'</div>';if(c.department)html+='<div class="emp-detail">'+c.department+'</div>';
  html+='<div class="emp-detail">'+(c.scanCount||0)+' scans</div></div><div class="emp-card-actions">';
  html+='<button class="emp-btn emp-btn-qr" onclick="showQR(\''+c.id+'\',\''+name.replace(/'/g,"\\'")+'\')" >QR Code</button>';
  html+='<button class="emp-btn emp-btn-edit" onclick="openEditModal(\''+c.id+'\')">Modifier</button>';
  html+='<button class="emp-btn emp-btn-delete" onclick="openDeleteModal(\''+c.id+'\',\''+name.replace(/'/g,"\\'")+'\')" >Supprimer</button></div></div>';}
  grid.innerHTML=html;
}

function openAddModal(){document.getElementById('modal-form-title').textContent='Nouvelle carte';document.getElementById('edit-id').value='';document.getElementById('f-firstName').value='';document.getElementById('f-lastName').value='';document.getElementById('f-title').value='';document.getElementById('f-department').value='';document.getElementById('f-phone').value='';document.getElementById('f-email').value='';document.getElementById('f-linkedin').value='';document.getElementById('f-company').value='Serioplast-TNSX';openModal('modal-form');}
function openEditModal(id){var card=null;for(var i=0;i<currentCards.length;i++){if(currentCards[i].id===id){card=currentCards[i];break;}}if(!card)return;document.getElementById('modal-form-title').textContent='Modifier la carte';document.getElementById('edit-id').value=id;document.getElementById('f-firstName').value=card.firstName||'';document.getElementById('f-lastName').value=card.lastName||'';document.getElementById('f-title').value=card.title||'';document.getElementById('f-department').value=card.department||'';document.getElementById('f-phone').value=card.phone||'';document.getElementById('f-email').value=card.email||'';document.getElementById('f-linkedin').value=card.linkedin||'';document.getElementById('f-company').value=card.company||'Serioplast-TNSX';openModal('modal-form');}

function saveCard(){
  var id=document.getElementById('edit-id').value;var firstName=document.getElementById('f-firstName').value.trim();var lastName=document.getElementById('f-lastName').value.trim();var title=document.getElementById('f-title').value.trim();
  if(!firstName||!lastName||!title){showToast('Prenom, Nom et Poste obligatoires.','error');return;}
  var data={firstName:firstName,lastName:lastName,title:title,department:document.getElementById('f-department').value.trim(),phone:document.getElementById('f-phone').value.trim(),email:document.getElementById('f-email').value.trim(),linkedin:document.getElementById('f-linkedin').value.trim(),company:document.getElementById('f-company').value.trim()||'Serioplast-TNSX',updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
  if(currentUserData&&currentUserData.role!=='admin')data.ownerUid=auth.currentUser.uid;
  var btn=document.getElementById('btn-save');btn.disabled=true;btn.textContent='Enregistrement...';
  var promise;if(id){promise=db.collection(CARDS).doc(id).update(data);}else{data.createdAt=firebase.firestore.FieldValue.serverTimestamp();data.scanCount=0;if(auth.currentUser&&(!currentUserData||currentUserData.role!=='admin'))data.ownerUid=auth.currentUser.uid;promise=db.collection(CARDS).add(data);}
  promise.then(function(){showToast(id?'Carte mise a jour!':'Carte creee!','success');closeModal('modal-form');if(currentUserData&&currentUserData.role==='admin')loadCards();else loadUserCard();}).catch(function(err){console.error(err);showToast('Erreur','error');}).finally(function(){btn.disabled=false;btn.textContent='Enregistrer';});
}

function openDeleteModal(id,name){deleteTargetId=id;document.getElementById('delete-name').textContent=name;openModal('modal-delete');}
function confirmDelete(){if(!deleteTargetId)return;db.collection(CARDS).doc(deleteTargetId).delete().then(function(){showToast('Carte supprimee.','success');closeModal('modal-delete');loadCards();}).catch(function(){showToast('Erreur','error');});deleteTargetId=null;}

function showQR(id,name){document.getElementById('qr-modal-name').textContent=name;var container=document.getElementById('qr-display');container.innerHTML='';var baseUrl=window.location.origin+window.location.pathname;var cardUrl=baseUrl+'#card/'+id;document.getElementById('qr-url-display').textContent=cardUrl;new QRCode(container,{text:cardUrl,width:220,height:220,colorDark:'#3d6e1e',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});openModal('modal-qr');}
function downloadQR(){var canvas=document.querySelector('#qr-display canvas');if(!canvas)return;var a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download='qr-business-card.png';a.click();showToast('QR code telecharge!','success');}

function printQR(){
  var canvas=document.querySelector('#qr-display canvas');if(!canvas)return;
  var name=document.getElementById('qr-modal-name').textContent;
  var card=null;for(var i=0;i<currentCards.length;i++){var n=(currentCards[i].firstName||'')+' '+(currentCards[i].lastName||'');if(n===name){card=currentCards[i];break;}}
  var win=window.open('','_blank');
  var h='<html><head><title>QR - '+name+'</title><style>*{margin:0;padding:0;box-sizing:border-box}body{display:flex;align-items:center;justify-content:center;height:100vh;font-family:Segoe UI,sans-serif;background:#fff}.pc{text-align:center;border:3px solid #61993B;border-radius:16px;padding:30px 40px;max-width:400px;width:100%}.pl{height:40px;margin-bottom:16px}.pn{font-size:22px;font-weight:700;color:#3d6e1e;margin-bottom:4px}.pt{font-size:14px;color:#666;margin-bottom:4px}.pco{font-size:13px;color:#61993B;font-weight:600;margin-bottom:20px}.pq img{width:200px;height:200px}.pi{font-size:11px;color:#999;margin-top:12px}.pd{font-size:13px;color:#333;margin-bottom:4px}</style></head><body><div class="pc">';
  h+='<img class="pl" src="'+LOGO_BASE64+'">';
  h+='<div class="pn">'+name+'</div>';
  if(card&&card.title)h+='<div class="pt">'+card.title+'</div>';
  h+='<div class="pco">'+(card&&card.company?card.company:'Serioplast-TNSX')+'</div>';
  h+='<div class="pq"><img src="'+canvas.toDataURL('image/png')+'"></div>';
  if(card&&card.phone)h+='<div class="pd">'+card.phone+'</div>';
  if(card&&card.email)h+='<div class="pd">'+card.email+'</div>';
  h+='<div class="pi">Scannez pour voir la carte de visite digitale</div></div></body></html>';
  win.document.write(h);win.document.close();setTimeout(function(){win.print();},500);
}

function openModal(id){document.getElementById(id).classList.add('active');}
function closeModal(id){document.getElementById(id).classList.remove('active');}
function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type?' '+type:'');setTimeout(function(){t.className='toast';},3000);}
var overlays=document.querySelectorAll('.modal-overlay');for(var i=0;i<overlays.length;i++){overlays[i].addEventListener('click',function(e){if(e.target===this)this.classList.remove('active');});}
<\/script>
</body>
</html>
